<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>야구 몬스터 헌터 | 시작 화면</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell" aria-label="야구 몬스터 헌터 시작 화면">
    <section class="start-screen">
      <img class="background-image" src="assets/bg-start.png" alt="야구장 배경" draggable="false" />

      <div class="top-ui">
        <div class="gold-box" aria-label="현재 보유 골드">
          <img class="gold-box__image" src="assets/ui-gold-panel.png" alt="" draggable="false" />
          <span id="goldText" class="gold-box__text">1,250G</span>
        </div>

        <button id="settingsButton" class="image-button settings-button" type="button" aria-label="설정 열기">
          <img src="assets/btn-settings.png" alt="설정" draggable="false" />
        </button>
      </div>

      <div class="logo-area">
        <img class="main-logo" src="assets/logo-main.png" alt="야구 몬스터 헌터" draggable="false" />
      </div>

      <div class="character-area" aria-hidden="true">
        <img class="player-image" src="assets/char-player.png" alt="" draggable="false" />
        <img class="monster-image" src="assets/char-monster.png" alt="" draggable="false" />
      </div>

      <div class="bottom-ui">
        <button id="startButton" class="image-button start-button" type="button" aria-label="게임 시작">
          <img src="assets/btn-start.png" alt="게임 시작" draggable="false" />
        </button>

        <button class="continue-button" type="button" disabled aria-label="이어하기는 추후 구현 예정입니다">
          <span>이어하기</span>
          <span class="continue-button__arrow">›</span>
        </button>
      </div>

      <p id="toast" class="toast" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
