<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>야구 몬스터 헌터 | 시작 화면</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="start">
  <main class="game-shell" aria-label="야구 몬스터 헌터 시작 화면">
    <section class="start-screen">
      <img class="start-bg" src="assets/start-bg.png" alt="야구장 배경" draggable="false" />

      <div class="start-top-ui">
        <button id="settingsButton" class="image-button settings-button" type="button" aria-label="설정 열기">
          <img src="assets/settings-btn.png" alt="설정" draggable="false" />
        </button>
      </div>

      <div class="start-logo-area">
        <img class="start-logo" src="assets/start-logo.png" alt="야구 몬스터 헌터" draggable="false" />
      </div>

      <div class="start-character-area" aria-hidden="true">
        <img class="start-monster-image" src="assets/start-monster.png" alt="" draggable="false" />
        <img class="start-player-image" src="assets/start-player.png" alt="" draggable="false" />
      </div>

      <div class="start-bottom-ui">
        <button id="startButton" class="image-button start-game-button" type="button" aria-label="게임 시작">
          <img src="assets/start-btn.png" alt="게임 시작" draggable="false" />
        </button>
      </div>

      <p id="toast" class="toast" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
