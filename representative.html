<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>야구 몬스터 헌터 | 대표 타자 설정</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="representative">
  <main class="game-shell" aria-label="대표 타자 설정 화면">
    <section class="representative-screen">
      <header class="status-bar" aria-label="현재 게임 상태">
        <div class="status-item">
          <img src="assets/icon-gold.png" alt="" draggable="false" />
          <div>
            <span class="status-label">골드</span>
            <strong id="goldValue">0G</strong>
          </div>
        </div>

        <div class="status-item">
          <img src="assets/icon-stage.png" alt="" draggable="false" />
          <div>
            <span class="status-label">스테이지</span>
            <strong id="stageValue">Stage 1</strong>
          </div>
        </div>

        <div class="status-item">
          <img src="assets/icon-attack.png" alt="" draggable="false" />
          <div>
            <span class="status-label">모드</span>
            <strong id="modeValue">공격</strong>
          </div>
        </div>
      </header>

      <div class="representative-content">
        <section class="title-card" aria-labelledby="pageTitle">
          <img class="title-card__icon" src="assets/icon-attack.png" alt="" draggable="false" />
          <div>
            <p class="eyebrow">대표 선수 선택</p>
            <h1 id="pageTitle">대표 타자 설정</h1>
          </div>
        </section>

        <section class="position-section" aria-labelledby="positionTitle">
          <div class="section-heading">
            <h2 id="positionTitle">포지션 선택</h2>
            <p>첫 공격 모드에서 사용할 대표 타자를 선택하세요.</p>
          </div>

          <div class="position-grid" role="radiogroup" aria-label="대표 타자 포지션 선택">
            <button class="position-button is-selected" type="button" role="radio" aria-checked="true" data-position="catcher">포수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="first">1루수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="second">2루수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="third">3루수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="shortstop">유격수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="left">좌익수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="center">중견수</button>
            <button class="position-button" type="button" role="radio" aria-checked="false" data-position="right">우익수</button>
          </div>
        </section>

        <section class="profile-card" aria-labelledby="profileTitle">
          <img class="profile-card__bg" src="assets/stadium-card.png" alt="" draggable="false" />
          <div class="profile-card__overlay"></div>
          <img class="profile-batter" src="assets/profile-batter.png" alt="대표 타자 프로필" draggable="false" />
          <div class="profile-info">
            <p class="profile-kicker">선택한 포지션</p>
            <h2 id="profileTitle"><span id="selectedPositionName">포수</span> 대표 타자</h2>
            <div class="stat-row">
              <span>레벨</span>
              <strong id="levelValue">Lv. 1</strong>
            </div>
            <div class="stat-row">
              <span>공격력</span>
              <strong id="attackValue">10</strong>
            </div>
          </div>
        </section>

        <section class="name-section" aria-labelledby="nameTitle">
          <div class="name-panel">
            <img class="name-panel__bg" src="assets/name-panel.png" alt="" draggable="false" />
            <label id="nameTitle" class="name-label" for="playerName">✏️ 이름 입력</label>
            <input id="playerName" class="name-input" type="text" maxlength="8" placeholder="이름을 입력하세요" value="" />
            <p class="name-help">이름은 언제든지 변경할 수 있습니다.</p>
          </div>

          <button id="changeNameButton" class="image-button change-button" type="button" aria-label="이름 변경">
            <img src="assets/btn-change.png" alt="변경" draggable="false" />
          </button>
        </section>

        <button id="confirmBatterButton" class="image-button confirm-button" type="button" aria-label="대표 타자 설정 완료">
          <img src="assets/btn-start-play.png" alt="시작하기" draggable="false" />
        </button>
      </div>

      <nav class="bottom-nav" aria-label="하단 메뉴">
        <button class="nav-button" type="button" data-target="game" aria-label="경기 화면으로 이동">
          <img src="assets/nav-game-off.png" alt="경기" draggable="false" />
        </button>
        <button class="nav-button is-current" type="button" data-target="players" aria-current="page" aria-label="선수 화면">
          <img src="assets/nav-player-on.png" alt="선수" draggable="false" />
        </button>
        <button class="nav-button" type="button" data-target="synergy" aria-label="시너지 화면으로 이동">
          <img src="assets/nav-synergy-off.png" alt="시너지" draggable="false" />
        </button>
        <button class="nav-button" type="button" data-target="log" aria-label="로그 화면으로 이동">
          <img src="assets/nav-log-off.png" alt="로그" draggable="false" />
        </button>
      </nav>

      <p id="toast" class="toast" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
